name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # Client binaries
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/wally-tunnel-linux-amd64       ./cmd/wally-tunnel
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/wally-tunnel-linux-arm64       ./cmd/wally-tunnel
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/wally-tunnel-darwin-amd64      ./cmd/wally-tunnel
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/wally-tunnel-darwin-arm64      ./cmd/wally-tunnel

          # Server binaries
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/wally-tunnel-server-linux-amd64 ./cmd/wally-tunnel-server
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/wally-tunnel-server-linux-arm64 ./cmd/wally-tunnel-server

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
